<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFooD - 지도</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .active-tab { color: #f97316; background-color: #f97316; color: white; border-radius: 9999px; }
        .tab-transition { transition: all 0.3s ease; }
    

        [v-cloak] {
            display: none;
        }

        .map-container {
            width: 100%;
            height: 650px;
            min-height: 60vh;
        }

        .filter-scroll {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
        }

        .filter-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .filter-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-scroll::-webkit-scrollbar-thumb {
            border-radius: 9999px;
            background: #cbd5e1;
        }

        .info-window {
            width: 250px;
            padding: 14px;
            box-sizing: border-box;
            font-family: Pretendard, Arial, sans-serif;
        }

        .info-window-image {
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
            border-radius: 12px;
            object-fit: cover;
        }

        .info-window-no-image {
            display: flex;
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #f1f5f9;
            color: #94a3b8;
            font-size: 12px;
        }

        .info-window-title {
            display: block;
            margin-bottom: 6px;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
        }

        .info-window-address {
            margin: 0;
            color: #64748b;
            font-size: 12px;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .map-container {
                height: 520px;
            }
        }
</style>
</head>
<body class="bg-[radial-gradient(circle_at_top,_#fff7ed,_#f8fafc_60%)] text-slate-800">
    <div id="app" v-cloak class="mx-auto flex min-h-screen max-w-7xl flex-col px-3 py-3 md:px-6 md:py-6 lg:px-8">
        <div class="overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-[0_20px_60px_-20px_rgba(15,23,42,0.25)]">
            <!-- Header / Navigation -->
            <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 px-5 py-4 backdrop-blur md:px-8">
                <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-orange-500">SSAFooD</p>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">광주 전라권 맛집 탐색</h1>
                    </div>
                    <nav class="flex flex-wrap gap-2 rounded-full border border-slate-200 bg-slate-50 p-1.5">
                        <a href="index.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">홈</a>
                        <a href="map.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition active-tab bg-orange-500 text-white shadow-sm cursor-pointer">지도</a>
                        <a href="chat.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">AI 챗봇</a>
                    </nav>
                </div>
            </header>
<!-- 메인 -->
        <main class="p-4 md:p-8">
          <section class="mb-6">
            <p
              class="
                text-sm font-semibold
                text-orange-500
              "
            >
              광주 전라권 음식점 지도
            </p>

            <h2
              class="
                mt-1 text-2xl font-bold
                tracking-tight text-slate-900
              "
            >
              지역과 음식 분류로 맛집을 찾아보세요
            </h2>

            <p
              class="
                mt-2 text-sm
                leading-6 text-slate-500
              "
            >
              지역과 음식 종류를 선택해 원하는 맛집을
              지도에서 확인해보세요.
            </p>
          </section>

          <!-- 홈 화면과 동일한 필터 디자인 -->
          <div
            class="
              mb-6 space-y-4
              rounded-3xl border border-slate-200
              bg-slate-50 p-4 md:p-6
            "
          >
            <!-- 카테고리 선택 -->
            <div>
              <p
                class="
                  mb-3 text-sm font-semibold
                  text-slate-500
                "
              >
                🏷️ 카테고리 선택
              </p>

              <div class="flex flex-wrap gap-2">
                <button
                  v-for="category in categories"
                  :key="category.code || 'all-category'"
                  type="button"
                  :class="[
                    'rounded-full px-4 py-2 text-xs md:text-sm font-medium transition-all',
                    selectedCategory === category.code
                      ? 'bg-orange-500 text-white shadow-sm'
                      : 'bg-white border border-slate-200 text-slate-600 hover:bg-orange-50 hover:text-orange-500'
                  ]"
                  @click="selectCategory(category)"
                >
                  {{ category.name }}
                </button>
              </div>
            </div>

            <hr class="border-slate-200">

            <!-- 지역 선택 -->
            <div>
              <p
                class="
                  mb-3 text-sm font-semibold
                  text-slate-500
                "
              >
                📍 지역 선택
              </p>

              <div class="flex flex-wrap gap-2">
                <button
                  v-for="region in regions"
                  :key="
                    region.name === '전체지역'
                      ? 'all-region'
                      : region.name === '기타 지역'
                        ? 'other-region'
                        : `${region.areacode}-${region.sigungucode}`
                  "
                  type="button"
                  :class="[
                    'rounded-full px-4 py-2 text-xs md:text-sm font-medium transition-all',
                    isSelectedRegion(region)
                      ? 'bg-orange-500 text-white shadow-sm'
                      : 'bg-white border border-slate-200 text-slate-600 hover:bg-orange-50 hover:text-orange-500'
                  ]"
                  @click="selectRegion(region)"
                >
                  {{ region.name }}
                </button>
              </div>
            </div>
          </div>

          <!-- 지도 -->
          <section
            class="
              relative overflow-hidden
              rounded-[28px]
              border border-slate-300
              bg-slate-100
            "
          >
            <div
              ref="mapContainer"
              class="map-container"
            ></div>

            <!-- 음식점 종류별 마커 색상 범례 -->
            <div
              v-if="!errorMessage"
              class="
                absolute bottom-4 right-4 z-10
                max-h-[240px] overflow-y-auto
                rounded-2xl border border-slate-200
                bg-white/95 p-3
                text-xs text-slate-600
                shadow-lg backdrop-blur
              "
            >
              <p class="mb-2 font-bold text-slate-800">
                마커 색상
              </p>

              <div class="grid grid-cols-2 gap-x-3 gap-y-2">
                <div
                  v-for="category in categories.filter(item => item.code)"
                  :key="`legend-${category.code}`"
                  class="flex items-center gap-2 whitespace-nowrap"
                >
                  <span
                    class="h-3 w-3 rounded-full border border-white shadow-sm"
                    :style="{ backgroundColor: category.color }"
                  ></span>
                  <span>{{ category.name }}</span>
                </div>
              </div>
            </div>

            <!-- 음식점 개수 -->
            <div
              v-if="!isLoading && !errorMessage"
              class="
                absolute left-4 top-4 z-10
                rounded-full bg-white/95
                px-4 py-2
                text-sm font-bold
                text-orange-500
                shadow-md backdrop-blur
              "
            >
              음식점 {{ locationCount }}개
            </div>

            <!-- 로딩 -->
            <div
              v-if="isLoading"
              class="
                absolute left-1/2 top-5 z-20
                -translate-x-1/2
                rounded-full bg-white/95
                px-4 py-2
                text-sm font-semibold
                text-slate-600
                shadow-lg
              "
            >
              음식점 데이터를 불러오는 중입니다.
            </div>

            <!-- 결과 없음 -->
            <div
              v-if="
                !isLoading
                && !errorMessage
                && locationCount === 0
              "
              class="
                absolute bottom-5 left-1/2 z-20
                -translate-x-1/2
                rounded-2xl bg-white/95
                px-5 py-3
                text-center text-sm
                font-semibold text-slate-600
                shadow-lg
              "
            >
              선택한 조건에 맞는 음식점이 없습니다.
            </div>

            <!-- 오류 -->
            <div
              v-if="errorMessage"
              class="
                absolute inset-0 z-30
                flex items-center
                justify-center
                bg-slate-50/95 p-6
                text-center
              "
            >
              <div>
                <p
                  class="
                    font-bold text-red-500
                  "
                >
                  지도를 표시하지 못했습니다.
                </p>

                <p
                  class="
                    mt-2 text-sm
                    text-slate-600
                  "
                >
                  {{ errorMessage }}
                </p>

                <button
                  type="button"
                  class="
                    mt-4 rounded-full
                    bg-orange-500
                    px-4 py-2
                    text-sm font-semibold
                    text-white
                  "
                  @click="initializeMap"
                >
                  다시 시도
                </button>
              </div>
            </div>
          </section>
        </main>
        </div>
    </div>
    <script>
    const {
      createApp,
      computed,
      onBeforeUnmount,
      onMounted,
      ref,
    } = Vue

    createApp({
      setup() {
        /*
         * 반드시 실제 키로 교체하세요.
         */
        const KAKAO_JAVASCRIPT_KEY =
          'be89b30d702576af14caf35a5141fb2e'

        /*
         * 다른 팀원의 백엔드 주소에 맞게 수정하세요.
         * 같은 서버에서 프론트와 백엔드를 제공한다면
         * 빈 문자열로 설정할 수도 있습니다.
         */
        const API_BASE_URL ='https://be-5861.onrender.com'


        const mapContainer = ref(null)

        const isLoading = ref(true)
        const errorMessage = ref('')
        const locationCount = ref(0)

        const selectedRegion = ref({
          name: '전체지역',
          areacode: '',
          sigungucode: '',
        })

        const selectedCategory = ref('')

        const regions = [
          {
            name: '전체지역',
            areacode: '',
            sigungucode: '',
          },
          {
            name: '광주 광산구',
            areacode: '5',
            sigungucode: '1',
          },
          {
            name: '광주 남구',
            areacode: '5',
            sigungucode: '2',
          },
          {
            name: '광주 동구',
            areacode: '5',
            sigungucode: '3',
          },
          {
            name: '광주 북구',
            areacode: '5',
            sigungucode: '4',
          },
          {
            name: '광주 서구',
            areacode: '5',
            sigungucode: '5',
          },
          {
            name: '전북 전주',
            areacode: '37',
            sigungucode: '12',
          },
          {
            name: '전북 남원',
            areacode: '37',
            sigungucode: '4',
          },
          {
            name: '전남 나주',
            areacode: '38',
            sigungucode: '6',
          },
          {
            name: '전남 순천',
            areacode: '38',
            sigungucode: '11',
          },
          {
            name: '전남 여수',
            areacode: '38',
            sigungucode: '13',
          },
          {
            name: '전남 담양',
            areacode: '38',
            sigungucode: '7',
          },
          {
            name: '기타 지역',
            areacode: 'other',
            sigungucode: 'other',
          },
        ]

        const categories = [
          {
            name: '전체보기',
            code: '',
            color: '#64748b',
          },
          {
            name: '한식',
            code: 'A05020100',
            color: '#ef4444',
          },
          {
            name: '양식',
            code: 'A05020200',
            color: '#3b82f6',
          },
          {
            name: '일식',
            code: 'A05020300',
            color: '#8b5cf6',
          },
          {
            name: '중식',
            code: 'A05020400',
            color: '#f59e0b',
          },
          {
            name: '분식',
            code: 'A05020500',
            color: '#ec4899',
          },
          {
            name: '패스트푸드',
            code: 'A05020600',
            color: '#f97316',
          },
          {
            name: '기타 외국식',
            code: 'A05020700',
            color: '#14b8a6',
          },
          {
            name: '카페/전통찻집',
            code: 'A05020900',
            color: '#a16207',
          },
          {
            name: '바(Bar) 및 주류',
            code: 'A05020800',
            color: '#4f46e5',
          },
        ]

        const selectedRegionName = computed(() => {
          return selectedRegion.value.name
        })

        const selectedCategoryName = computed(() => {
          const category = categories.find(
            item => item.code === selectedCategory.value
          )

          return category?.name || '전체'
        })

        let map = null
        let clusterer = null
        let markers = []
        let openedInfoWindow = null
        const markerImageCache = new Map()

        function getLocationCategoryCode(location) {
          return String(
            location.category_code
            ?? location.cat3
            ?? ''
          )
        }

        function getCategoryMeta(locationOrCode) {
          const categoryCode =
            typeof locationOrCode === 'string'
              ? locationOrCode
              : getLocationCategoryCode(locationOrCode)

          return categories.find(
            category => category.code === categoryCode
          ) || {
            name: '기타 음식점',
            code: categoryCode,
            color: '#64748b',
          }
        }

        function createCategoryMarkerImage(categoryCode) {
          const kakao = window.kakao
          const category = getCategoryMeta(categoryCode)
          const cacheKey = category.code || 'unknown'

          if (markerImageCache.has(cacheKey)) {
            return markerImageCache.get(cacheKey)
          }

          const markerSvg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="50" viewBox="0 0 38 50">
              <filter id="shadow" x="-40%" y="-30%" width="180%" height="190%">
                <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.28"/>
              </filter>
              <path
                d="M19 1.5C9.3 1.5 1.5 9.3 1.5 19c0 13.2 17.5 29.2 17.5 29.2S36.5 32.2 36.5 19C36.5 9.3 28.7 1.5 19 1.5Z"
                fill="${category.color}"
                stroke="#ffffff"
                stroke-width="2.5"
                filter="url(#shadow)"
              />
              <circle cx="19" cy="18.5" r="7.2" fill="#ffffff" fill-opacity="0.96"/>
              <circle cx="19" cy="18.5" r="3.1" fill="${category.color}"/>
            </svg>
          `

          const markerImage = new kakao.maps.MarkerImage(
            `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(markerSvg)}`,
            new kakao.maps.Size(38, 50),
            {
              offset: new kakao.maps.Point(19, 48),
            }
          )

          markerImageCache.set(cacheKey, markerImage)
          return markerImage
        }

        function loadKakaoMapSdk() {
          return new Promise((resolve, reject) => {
            if (
              !KAKAO_JAVASCRIPT_KEY
              || KAKAO_JAVASCRIPT_KEY.includes('여기에_')
            ) {
              reject(
                new Error(
                  'map.html 안의 카카오 JavaScript 키를 설정하세요.'
                )
              )
              return
            }

            if (window.kakao?.maps) {
              window.kakao.maps.load(resolve)
              return
            }

            const existingScript =
              document.getElementById('kakao-map-sdk')

            if (existingScript) {
              existingScript.addEventListener(
                'load',
                () => {
                  window.kakao.maps.load(resolve)
                },
                { once: true }
              )

              existingScript.addEventListener(
                'error',
                () => {
                  reject(
                    new Error(
                      '카카오 지도 SDK를 불러오지 못했습니다.'
                    )
                  )
                },
                { once: true }
              )

              return
            }

            const script =
              document.createElement('script')

            script.id = 'kakao-map-sdk'
            script.async = true

            script.src =
              'https://dapi.kakao.com/v2/maps/sdk.js'
              + `?appkey=${encodeURIComponent(
                KAKAO_JAVASCRIPT_KEY
              )}`
              + '&autoload=false'
              + '&libraries=clusterer'

            script.onload = () => {
              window.kakao.maps.load(resolve)
            }

            script.onerror = () => {
              reject(
                new Error(
                  '카카오 지도 SDK를 불러오지 못했습니다.'
                )
              )
            }

            document.head.appendChild(script)
          })
        }

        function escapeHtml(value) {
          const text = String(value ?? '')

          const replacements = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;',
          }

          return text.replace(
            /[&<>"']/g,
            character => replacements[character]
          )
        }

        function createInfoWindowContent(location) {
          const title = escapeHtml(location.title || '이름 없음');
          const address = escapeHtml(location.address || '주소 정보가 없습니다.');
          const imageUrl = location.image_url ? escapeHtml(location.image_url) : '';
          const category = getCategoryMeta(location)
          const categoryName = category.name
          const categoryColor = category.color

          // [수정] 홈의 특정 가게 상세 페이지로 Query Parameter를 실어 이동하는 링크 생성
          const detailLink = `./index.html?content_id=${encodeURIComponent(location.content_id)}`;

          const imageHtml = imageUrl
            ? `
              <img
                src="${imageUrl}"
                alt="${title}"
                class="info-window-image"
                onerror="
                  this.style.display='none';
                  this.nextElementSibling.style.display='flex';
                "
              >
              <div class="info-window-no-image" style="display: none;">이미지 없음</div>
            `
            : `<div class="info-window-no-image">이미지 없음</div>`;

          return `
            <div class="info-window">
              ${imageHtml}
              <strong class="info-window-title">
                ${title}
              </strong>
              <p style="margin: 0 0 6px; color: ${categoryColor}; font-size: 12px; font-weight: 700;">
                ${escapeHtml(categoryName)}
              </p>
              <p class="info-window-address" style="margin-bottom: 8px;">
                ${address}
              </p>
              <a href="${detailLink}" 
                class="block text-center bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold py-1.5 rounded-lg transition-colors"
                style="text-decoration: none;">
                👉 가게 상세 및 리뷰 보기
              </a>
            </div>
          `;
        }

        function closeInfoWindow() {
          if (!openedInfoWindow) {
            return
          }

          openedInfoWindow.close()
          openedInfoWindow = null
        }

        function clearMarkers() {
          closeInfoWindow()

          if (clusterer) {
            clusterer.clear()
          }

          markers.forEach(marker => {
            marker.setMap(null)
          })

          markers = []
        }

        function createMarkers(locations) {
          const kakao = window.kakao

          clearMarkers()

          const validLocations =
            locations.filter(location => {
              const latitude =
                Number(location.latitude)

              const longitude =
                Number(location.longitude)

              return (
                Number.isFinite(latitude)
                && Number.isFinite(longitude)
              )
            })

          locationCount.value =
            validLocations.length

          console.log(
            `[지도] 전체 ${locations.length}개 중 유효 좌표 ${validLocations.length}개`
          )

          if (
            locations.length > 0
            && validLocations.length === 0
          ) {
            console.error(
              '[지도] 첫 번째 데이터:',
              locations[0]
            )
          }

          markers =
            validLocations.map(location => {
              const position =
                new kakao.maps.LatLng(
                  Number(location.latitude),
                  Number(location.longitude)
                )

              const categoryCode =
                getLocationCategoryCode(location)

              const marker =
                new kakao.maps.Marker({
                  position,
                  title:
                    location.title || '이름 없음',
                  image:
                    createCategoryMarkerImage(categoryCode),
                })

              const infoWindow =
                new kakao.maps.InfoWindow({
                  content:
                    createInfoWindowContent(location),
                  removable: true,
                })

              kakao.maps.event.addListener(
                marker,
                'click',
                () => {
                  closeInfoWindow()

                  infoWindow.open(
                    map,
                    marker
                  )

                  openedInfoWindow =
                    infoWindow
                }
              )

              return marker
            })

          clusterer =
            new kakao.maps.MarkerClusterer({
              map,
              averageCenter: true,
              minLevel: 6,
              gridSize: 60,
            })

          clusterer.addMarkers(markers)

          fitMapToMarkers(validLocations)
        }

        function fitMapToMarkers(locations) {
          if (!map || locations.length === 0) {
            return
          }

          const bounds =
            new window.kakao.maps.LatLngBounds()

          locations.forEach(location => {
            bounds.extend(
              new window.kakao.maps.LatLng(
                Number(location.latitude),
                Number(location.longitude)
              )
            )
          })

          map.setBounds(bounds)

          if (locations.length === 1) {
            map.setLevel(4)
          }
        }

        async function getLocations(filters = {}) {
          const params =
            new URLSearchParams()

          const isOtherRegion =
            filters.areacode === 'other'

          if (
            filters.areacode
            && !isOtherRegion
          ) {
            params.set(
              'areacode',
              filters.areacode
            )
          }

          if (
            filters.sigungucode
            && !isOtherRegion
          ) {
            params.set(
              'sigungucode',
              filters.sigungucode
            )
          }

          if (filters.cat3) {
            params.set(
              'cat3',
              filters.cat3
            )
          }

          const queryString =
            params.toString()

          const url = queryString
            ? `${API_BASE_URL}/api/locations?${queryString}`
            : `${API_BASE_URL}/api/locations`

          console.log('[지도] 요청 URL:', url)

          const response =
            await fetch(url, {
              method: 'GET',
              mode: 'cors',
              credentials: 'omit',
              headers: {
                Accept: 'application/json',
              },
            })

          if (!response.ok) {
            const errorText = await response.text()

            console.error(
              '[지도] API 오류:',
              response.status,
              errorText
            )

            throw new Error(
              `음식점 데이터 조회 실패: ${response.status}`
            )
          }

          const data =
            await response.json()

          console.log(
            `[지도] 음식점 ${Array.isArray(data) ? data.length : 0}개 수신`,
            Array.isArray(data) ? data.slice(0, 3) : data
          )

          if (!Array.isArray(data)) {
            throw new Error(
              '음식점 API 응답 형식이 올바르지 않습니다.'
            )
          }

          if (isOtherRegion) {
            const mainRegionKeys =
              new Set([
                '5-1',
                '5-2',
                '5-3',
                '5-4',
                '5-5',
                '37-12',
                '37-4',
                '38-6',
                '38-11',
                '38-13',
                '38-7',
              ])

            return data.filter(location => {
              const regionKey =
                `${String(location.areacode ?? '')}`
                + '-'
                + `${String(location.sigungucode ?? '')}`

              return !mainRegionKeys.has(regionKey)
            })
          }

          return data
        }

        async function loadLocations() {
          try {
            isLoading.value = true
            errorMessage.value = ''

            const locations =
              await getLocations({
                areacode:
                  selectedRegion.value.areacode,
                sigungucode:
                  selectedRegion.value.sigungucode,
                cat3:
                  selectedCategory.value,
              })

            createMarkers(locations)
          } catch (error) {
            console.error(error)

            clearMarkers()
            locationCount.value = 0

            errorMessage.value =
              error instanceof Error
                ? error.message
                : '음식점 데이터를 불러오지 못했습니다.'
          } finally {
            isLoading.value = false
          }
        }

        function isSelectedRegion(region) {
          return (
            selectedRegion.value.areacode
              === region.areacode
            && selectedRegion.value.sigungucode
              === region.sigungucode
          )
        }

        async function selectRegion(region) {
          selectedRegion.value = {
            ...region,
          }

          await loadLocations()
        }

        async function selectCategory(category) {
          selectedCategory.value =
            category.code

          await loadLocations()
        }

        async function resetFilters() {
          selectedRegion.value = {
            name: '전체지역',
            areacode: '',
            sigungucode: '',
          }

          selectedCategory.value = ''

          await loadLocations()
        }

        async function initializeMap() {
          try {
            isLoading.value = true
            errorMessage.value = ''

            await loadKakaoMapSdk()

            const kakao = window.kakao

            const initialPosition =
              new kakao.maps.LatLng(
                35.1595,
                126.8526
              )

            if (!map) {
              map =
                new kakao.maps.Map(
                  mapContainer.value,
                  {
                    center: initialPosition,
                    level: 9,
                  }
                )

              const zoomControl =
                new kakao.maps.ZoomControl()

              map.addControl(
                zoomControl,
                kakao.maps.ControlPosition.RIGHT
              )

              const mapTypeControl =
                new kakao.maps.MapTypeControl()

              map.addControl(
                mapTypeControl,
                kakao.maps.ControlPosition.TOPRIGHT
              )

              kakao.maps.event.addListener(
                map,
                'click',
                () => {
                  closeInfoWindow()
                }
              )
            }

            await loadLocations()
          } catch (error) {
            console.error(error)

            errorMessage.value =
              error instanceof Error
                ? error.message
                : '지도를 불러오는 중 오류가 발생했습니다.'
          } finally {
            isLoading.value = false
          }
        }

        function handleResize() {
          if (!map) {
            return
          }

          map.relayout()
        }

        onMounted(() => {
          initializeMap()

          window.addEventListener(
            'resize',
            handleResize
          )
        })

        onBeforeUnmount(() => {
          window.removeEventListener(
            'resize',
            handleResize
          )

          clearMarkers()

          clusterer = null
          map = null
        })

        return {
          mapContainer,

          regions,
          categories,

          isLoading,
          errorMessage,
          locationCount,

          selectedRegion,
          selectedCategory,
          selectedRegionName,
          selectedCategoryName,

          isSelectedRegion,
          selectRegion,
          selectCategory,
          resetFilters,
          initializeMap,
        }
      },
    }).mount('#app')
  </script>
</body>
</html>
