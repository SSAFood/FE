<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFooD - 지도</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .active-tab { color: #f97316; background-color: #f97316; color: white; border-radius: 9999px; }
        .tab-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[radial-gradient(circle_at_top,_#fff7ed,_#f8fafc_60%)] text-slate-800">
    <div id="app" class="mx-auto flex min-h-screen max-w-7xl flex-col px-3 py-3 md:px-6 md:py-6 lg:px-8">
        <div class="overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-[0_20px_60px_-20px_rgba(15,23,42,0.25)]">
            <!-- Header / Navigation -->
            <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 px-5 py-4 backdrop-blur md:px-8">
                <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-orange-500">SSAFooD</p>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">광주 전라권 맛집 탐색</h1>
                    </div>
                    <nav class="flex flex-wrap gap-2 rounded-full border border-slate-200 bg-slate-50 p-1.5">
                        <a href="index.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">홈</a>
                        <a href="map.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition active-tab bg-orange-500 text-white shadow-sm cursor-pointer">지도</a>
                        <a href="chat.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">AI 챗봇</a>
                    </nav>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Map View -->
                <div class="grid gap-4 lg:grid-cols-[1.4fr_0.6fr]">
                    <div class="flex min-h-[60vh] items-center justify-center rounded-[28px] border border-dashed border-slate-300 bg-slate-50 p-6 text-center">
                        <div>
                            <p class="text-lg font-semibold text-slate-700">카카오맵 또는 구글맵 영역</p>
                            <p class="mt-2 text-sm text-slate-500">위치 데이터를 연결하면 여기서 지도를 렌더링할 수 있습니다.</p>
                        </div>
                    </div>
                    <div class="space-y-4 rounded-[28px] border border-slate-200 bg-white p-5 shadow-sm">
                        <div>
                            <p class="text-sm font-semibold text-orange-500">추천 경로</p>
                            <h3 class="mt-1 text-xl font-bold text-slate-900">한 번에 둘러보기</h3>
                        </div>
                        <div class="space-y-3">
                            <div class="rounded-2xl border border-slate-200 p-3">
                                <p class="font-semibold text-slate-800">동구 중심</p>
                                <p class="text-sm text-slate-500">전통 한식과 가성비 식당 위주</p>
                            </div>
                            <div class="rounded-2xl border border-slate-200 p-3">
                                <p class="font-semibold text-slate-800">서구 상권</p>
                                <p class="text-sm text-slate-500">데이트와 회식에 어울리는 장소</p>
                            </div>
                            <div class="rounded-2xl border border-slate-200 p-3">
                                <p class="font-semibold text-slate-800">광산구</p>
                                <p class="text-sm text-slate-500">가족 모임과 혼밥 모두 추천</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            setup() {
                return {};
            }
        }).mount('#app');
    </script>
</body>
</html>
