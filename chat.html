<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAFooD - AI 챗봇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .active-tab { color: #f97316; background-color: #f97316; color: white; border-radius: 9999px; }
        .tab-transition { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[radial-gradient(circle_at_top,_#fff7ed,_#f8fafc_60%)] text-slate-800">
    <div id="app" class="mx-auto flex min-h-screen max-w-7xl flex-col px-3 py-3 md:px-6 md:py-6 lg:px-8">
        <div class="overflow-hidden rounded-[32px] border border-slate-200 bg-white shadow-[0_20px_60px_-20px_rgba(15,23,42,0.25)]">
            <!-- Header / Navigation -->
            <header class="sticky top-0 z-50 border-b border-slate-100 bg-white/90 px-5 py-4 backdrop-blur md:px-8">
                <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                    <div>
                        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-orange-500">SSAFooD</p>
                        <h1 class="text-2xl font-bold tracking-tight text-slate-900">광주 전라권 맛집 탐색</h1>
                    </div>
                    <nav class="flex flex-wrap gap-2 rounded-full border border-slate-200 bg-slate-50 p-1.5">
                        <a href="index.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">홈</a>
                        <a href="map.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition text-slate-600 hover:bg-white hover:text-orange-500 cursor-pointer">지도</a>
                        <a href="chat.html" class="rounded-full px-4 py-2 text-sm font-semibold tab-transition active-tab bg-orange-500 text-white shadow-sm cursor-pointer">AI 챗봇</a>
                    </nav>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <!-- Chat View -->
                <div class="mx-auto flex h-full max-w-3xl flex-col rounded-[28px] border border-slate-200 bg-white shadow-sm">
                    <div ref="chatMessages" class="flex-1 space-y-4 overflow-y-auto p-4 md:p-6">
                        <div v-for="msg in messages" :key="msg.id" :class="['flex', msg.sender === 'ai' ? 'justify-start' : 'justify-end']">
                            <div :class="['max-w-[85%] whitespace-pre-wrap rounded-2xl px-4 py-3 text-sm leading-6 shadow-sm', msg.sender === 'ai' ? 'bg-slate-100 text-slate-800' : 'bg-orange-500 text-white']">
                                {{ msg.text }}
                            </div>
                        </div>

                        <div v-if="isLoading" class="flex justify-start">
                            <div class="rounded-2xl bg-slate-100 px-4 py-3 text-sm text-slate-500 shadow-sm">
                                맛집 정보를 찾고 있습니다...
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-slate-200 bg-slate-50 p-3 md:p-4">
                        <form class="flex gap-2" @submit.prevent="sendMessage">
                            <input
                                v-model="userInput"
                                :disabled="isLoading"
                                class="flex-1 rounded-full border border-slate-200 bg-white px-4 py-3 text-sm outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-100 disabled:bg-slate-100 disabled:text-slate-400"
                                placeholder="어떤 맛집을 찾으시나요?"
                            >
                            <button
                                type="submit"
                                :disabled="isLoading || !userInput.trim()"
                                class="rounded-full bg-orange-500 px-5 py-3 text-sm font-semibold text-white shadow-lg shadow-orange-200 transition hover:bg-orange-600 disabled:cursor-not-allowed disabled:opacity-50"
                            >
                                {{ isLoading ? '답변 중' : '전송' }}
                            </button>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const {
            createApp,
            nextTick,
            ref
        } = Vue;

        createApp({
            setup() {
                const API_BASE_URL =
                    "https://be-5861.onrender.com";

                const messages = ref([
                    {
                        id: 1,
                        text: "안녕하세요! 오늘은 어떤 메뉴를 찾고 계신가요?",
                        sender: "ai"
                    }
                ]);

                const userInput = ref("");
                const isLoading = ref(false);
                const chatMessages = ref(null);

                const createMessageId = () => {
                    return (
                        Date.now().toString()
                        + Math.random().toString(36).slice(2)
                    );
                };

                const getSessionId = () => {
                    const storageKey =
                        "ssafood_chat_session_id";

                    let sessionId =
                        localStorage.getItem(storageKey);

                    if (!sessionId) {
                        sessionId =
                            window.crypto?.randomUUID
                                ? window.crypto.randomUUID()
                                : (
                                    "user_"
                                    + Date.now()
                                    + "_"
                                    + Math.random()
                                        .toString(36)
                                        .slice(2)
                                );

                        localStorage.setItem(
                            storageKey,
                            sessionId
                        );
                    }

                    return sessionId;
                };

                const scrollToBottom = async () => {
                    await nextTick();

                    if (!chatMessages.value) {
                        return;
                    }

                    chatMessages.value.scrollTop =
                        chatMessages.value.scrollHeight;
                };

                const sendMessage = async () => {
                    const message =
                        userInput.value.trim();

                    if (!message || isLoading.value) {
                        return;
                    }

                    messages.value.push({
                        id: createMessageId(),
                        text: message,
                        sender: "user"
                    });

                    userInput.value = "";
                    isLoading.value = true;

                    await scrollToBottom();

                    try {
                        const response = await fetch(
                            `${API_BASE_URL}/api/chat`,
                            {
                                method: "POST",
                                mode: "cors",
                                credentials: "omit",
                                headers: {
                                    "Content-Type":
                                        "application/json",
                                    Accept:
                                        "application/json"
                                },
                                body: JSON.stringify({
                                    message,
                                    session_id:
                                        getSessionId()
                                })
                            }
                        );

                        if (!response.ok) {
                            const errorText =
                                await response.text();

                            throw new Error(
                                `챗봇 요청 실패: `
                                + `${response.status} `
                                + errorText
                            );
                        }

                        const data =
                            await response.json();

                        messages.value.push({
                            id: createMessageId(),
                            text:
                                data.reply
                                || "답변을 생성하지 못했습니다.",
                            sender: "ai"
                        });
                    } catch (error) {
                        console.error(
                            "챗봇 연결 오류:",
                            error
                        );

                        messages.value.push({
                            id: createMessageId(),
                            text:
                                "챗봇 서버와 연결하지 못했습니다. "
                                + "잠시 후 다시 시도해 주세요.",
                            sender: "ai"
                        });
                    } finally {
                        isLoading.value = false;
                        await scrollToBottom();
                    }
                };

                return {
                    messages,
                    userInput,
                    isLoading,
                    chatMessages,
                    sendMessage
                };
            }
        }).mount("#app");
    </script>
</body>
</html>
